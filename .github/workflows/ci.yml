---
name: CI

on:  # yamllint disable-line rule:truthy
  merge_group:
  pull_request:

jobs:
  check-quality:
    name: 🔎 Check quality
    runs-on: macos-26
    steps:
      - name: Checkout code
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10  #  v6.0.3

      - name: Run the quality check
        run: make check-quality

  tests:
    name: 🧪 Tests
    runs-on: macos-26
    timeout-minutes: 30
    strategy:
      fail-fast: false
      matrix:
        platform: [ios, tvos]
    steps:
      - name: Checkout code
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10  #  v6.0.3

      - name: Run tests
        run: make test-${{ matrix.platform }}

      - name: Publish report
        uses: mikepenz/action-junit-report@3a81627bfac62268172037048872e8ebd4207e6d  #  v6.4.1
        if: always()
        with:
          report_paths: 'fastlane/test_output/*.xml'
          check_name: 📋 Unit test report (${{ matrix.platform }})
          fail_on_failure: true

  build-demos:
    name: 🔨 Builds
    runs-on: macos-26
    strategy:
      matrix:
        platform: [ios, tvos]
    steps:
      - name: Checkout code
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10  #  v6.0.3

      - name: Build the demo
        run: make build-${{ matrix.platform }}
